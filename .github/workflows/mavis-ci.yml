name: mavis framework CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-syntax:
    name: Python lint + syntax
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: py_compile all mavis_*.py and crewai_v*.py
        run: |
          echo "=== py_compile check ==="
          find . -name "mavis_*.py" -not -path "./.git/*" | while read f; do
            python3 -m py_compile "$f" 2>&1 && echo "  ✅ $f" || echo "  ❌ $f"
          done
          find . -name "crewai_v*.py" -not -path "./.git/*" | while read f; do
            python3 -m py_compile "$f" 2>&1 && echo "  ✅ $f" || echo "  ❌ $f"
          done

      - name: Verify monorepo structure
        run: |
          echo "=== 20 mavis project links ==="
          ls -la | grep -E "mavis-" | wc -l
          echo ""
          echo "=== 24 invariant count in memory topic ==="
          grep -c "^## 🚨 永久 invariant" ~/.mavis/agents/mavis/memory/topics/agent-dev-book-2026-07-10.md || echo "memory topic not in repo (expected, lives in ~/.mavis)"

  mavis-v3-status:
    name: mavis_v3.py status smoke test
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install llama-index + httpx + langgraph
        run: |
          pip install --quiet httpx llama-index-core llama-index-llms-ollama llama-index-embeddings-ollama langgraph 2>&1 | tail -5

      - name: Run mavis_v3 status
        run: |
          python3 mavis-crewai-v7/mavis_v3.py status 2>&1 | head -30
