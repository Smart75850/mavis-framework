
# LoRA 配置 (借鉴第 7 章 §7.3.1)
model_name_or_path: /models/MiniMax/M3-7B
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
task_type: CAUSAL_LM

# 训练参数
num_train_epochs: 3
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2e-4
fp16: True
max_seq_length: 2048
